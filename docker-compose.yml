services:
  db:
    image: postgres:16
    container_name: finadvisor_db
    environment:
      POSTGRES_DB: finadvisor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - finadvisor_db:/var/lib/postgresql/data

  app:
    build: .
    container_name: finadvisor_app
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/finadvisor
      SECRET_KEY: ${SECRET_KEY:-dev_secret_key}
      EMAIL_ENCRYPTION_KEY: ${EMAIL_ENCRYPTION_KEY:-dev_email_key}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8000/api/v1/auth/google/callback}
      SERVER_BASE_URL: ${SERVER_BASE_URL:-http://localhost:8000}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:8000"]}
      EMAIL_CHECK_INTERVAL_MINUTES: ${EMAIL_CHECK_INTERVAL_MINUTES:-2}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "8000:8000"
    volumes:
      - .:/app

volumes:
  finadvisor_db:
